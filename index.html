<style>
:root {
  --night: #0d0a08;
  --deep: #161109;
  --ember: #c0392b;
  --gold: #c9952a;
  --gold-dim: rgba(201,149,42,0.35);

}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--night);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  background-image:

}

body::before {

}

.header { text-align:center; margin-bottom:1.2rem; }
.header-zh {

  letter-spacing: 0.3em;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201,149,42,0.3);
  line-height: 1;
}
.header-en {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(0.6rem,1.8vw,0.75rem);
  letter-spacing: 0.2em;
  color: rgba(201,149,42,0.5);
  margin-top: 0.25rem;
}
.header-line {
  width: 80px; height: 1px;
  background: linear-gradient(90deg,transparent,var(--gold),transparent);
  margin: 0.6rem auto 0;
}

.calc-band {
  border: 1px solid rgba(201,149,42,0.2);
  border-radius: 2px;
  padding: 1.2rem 1.5rem;
  margin-top: 2rem;

  font-family:'Noto Sans SC',sans-serif;

}
.calc-band strong { color:var(--gold); font-weight:400; }
.calc-row { display:flex; flex-wrap:wrap; gap:0.3rem 1.8rem; }
.calc-item { white-space: nowrap; }
.calc-datetime {

  font-style:italic;
  font-size:0.85rem;
  color:rgba(201,149,42,0.6);
  margin-bottom:0.6rem;
  letter-spacing:0.05em;
}
.calc-divider {
  width:100%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,149,42,0.15),transparent);
  margin:0.6rem 0;
}

.hex-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
}

.hex-card {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  padding: 2rem 2.5rem;
  border: 1px solid var(--gold-dim);
  border-radius: 2px;
  background: var(--mist);
  transition: all 0.3s ease;
  position: relative;
  width: 100%;
}
.hex-card::before {
  content:'';
  position:absolute; inset:5px;
  border:1px solid rgba(201,149,42,0.1);
  border-radius:1px;
  pointer-events:none;
}
.hex-card:hover {
  border-color: rgba(201,149,42,0.6);
  background: rgba(201,149,42,0.04);
  box-shadow: 0 0 30px rgba(201,149,42,0.08);
}
.hex-card-inner {
  display:flex;
  align-items:center;
  justify-content:center;
  gap: 2.5rem;
}

.secondary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  width: 100%;
  max-width: 420px;
}
.secondary-card {
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.8rem;
  padding:1.2rem 1rem;
  border:1px solid rgba(201,149,42,0.15);

}
.secondary-card:hover { border-color:rgba(201,149,42,0.35); }
.secondary-label {

}
.secondary-lines { display:flex; flex-direction:column-reverse; gap:4px; }
.crow { display:flex; gap:5px; }
.cbar { height:4px; border-radius:1px; background:rgba(232,223,200,0.35); }
.cbar.yang { width:32px; }
.cbar.yin-l,.cbar.yin-r { width:13px; }
.secondary-name-en { font-family:'IM Fell English',serif; font-style:italic; font-size:0.85rem; color:rgba(201,149,42,0.55); margin-top:0.3rem; }
.secondary-num { font-family:'Noto Sans SC',sans-serif; font-size:0.48rem; color:rgba(201,149,42,0.3); letter-spacing:0.2em; margin-top:0.2rem; }
.secondary-tap { font-family:'Noto Sans SC',sans-serif; font-size:0.45rem; letter-spacing:0.25em; color:rgba(201,149,42,0.25); text-transform:uppercase; margin-top:0.3rem; }

.hex-lines-wrap {
  display:flex;
  flex-direction: column-reverse;
  gap: 7px;
  align-items:center;
}
.hex-row {
  display:flex;
  gap:8px;
  align-items:center;
  position:relative;
  justify-content:center;
}
.hbar { height: 6px; border-radius: 1px; transition: background 0.3s; }
.hbar.yang { width: 52px; background: var(--parchment); }
.hbar.yin-l,.hbar.yin-r { width: 22px; background: var(--parchment); }
.hbar.moving { background: var(--ember) !important; box-shadow: 0 0 8px rgba(192,57,43,0.5); }
.hex-row-num {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.45rem;
  color: rgba(201,149,42,0.4);
  width:10px;
  text-align:right;
  font-weight:300;
  position:absolute;
  left:-18px;
  top:50%;
  transform:translateY(-50%);
}
.trigram-label {
  position: absolute;
  right: -38px;
  font-size: 0.55rem;
  color: rgba(201,149,42,0.5);
  font-family:'Noto Sans SC',sans-serif;
  white-space:nowrap;
}

.hex-info { text-align:left; }
.hex-num-badge {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.55rem;
  color:rgba(201,149,42,0.5);
  letter-spacing:0.3em;
  margin-bottom:0.4rem;
}
.hex-name-en {
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:2rem;
  color:var(--gold);
  margin-top:0.2rem;
  line-height:1.2;
}
.hex-trigrams-note {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.6rem;
  color:rgba(232,223,200,0.4);
  margin-top:0.5rem;
  line-height:1.7;
}
.hex-tap-hint {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.5rem;
  letter-spacing:0.3em;
  color:rgba(201,149,42,0.4);
  margin-top:0.8rem;
  text-transform:uppercase;
}

.ti-yong-row {
  display:flex;
  gap:1rem;
  justify-content:center;
  width:100%;
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.62rem;
  color:rgba(232,223,200,0.45);
}
.ti-badge, .yong-badge {
  padding:0.2rem 0.8rem;
  border:1px solid rgba(201,149,42,0.2);
  border-radius:2px;
}
.ti-badge { border-color: rgba(201,149,42,0.3); color:rgba(201,149,42,0.7); }
.yong-badge { border-color: rgba(192,57,43,0.3); color:rgba(192,57,43,0.6); }

.modal-overlay {
  position:fixed; inset:0;
  background:rgba(8,6,4,0.85);
  z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:1.5rem;
  animation: mfade 0.2s ease;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display:none; }
@keyframes mfade { from{opacity:0} to{opacity:1} }

.modal {
  background: #131009;
  border: 1px solid rgba(201,149,42,0.35);
  border-radius: 2px;
  max-width: 560px;
  width: 100%;
  padding: 2.5rem;
  position: relative;
  max-height: 88vh;
  overflow-y: auto;
  animation: mrise 0.25s ease;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}
.modal::before {
  content:'';
  position:absolute; inset:8px;
  border:1px solid rgba(201,149,42,0.08);
  pointer-events:none;
  border-radius:1px;
}
@keyframes mrise { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-close {
  position:absolute; top:1.2rem; right:1.2rem;
  background:none; border:none; color:rgba(201,149,42,0.5);
  cursor:pointer; font-size:1.1rem; font-family:'IM Fell English',serif;
  transition:color 0.2s;
}
.modal-close:hover { color:var(--gold); }

.modal-top { display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap; margin-bottom:1.5rem; }
.modal-hex-lines { display:flex; flex-direction:column-reverse; gap:8px; }
.modal-hex-row { display:flex; gap:10px; position:relative; }
.mbar { height:7px; border-radius:1px; background:var(--parchment); }
.mbar.yang { width:58px; }
.mbar.yin-l,.mbar.yin-r { width:24px; }
.mbar.moving-m { background:var(--ember); box-shadow:0 0 10px rgba(192,57,43,0.5); }
.modal-hex-row-num {
  font-size:0.5rem; color:rgba(201,149,42,0.35);
  position:absolute; right:-20px; top:50%; transform:translateY(-50%);
  font-family:'Noto Sans SC',sans-serif;
}

.modal-identity { flex:1; min-width:160px; }
.modal-num { font-family:'Noto Sans SC',sans-serif; font-size:0.55rem; letter-spacing:0.3em; color:rgba(201,149,42,0.5); margin-bottom:0.4rem; }
.modal-name-en { font-family:'IM Fell English',serif; font-style:italic; font-size:2rem; color:var(--gold); margin-top:0.2rem; line-height:1.2; }

.modal-divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:1.2rem 0; }

.modal-section-title {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.55rem;
  letter-spacing:0.35em;
  color:rgba(201,149,42,0.5);
  text-transform:uppercase;
  margin-bottom:0.6rem;
}
.modal-body-text {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.82rem;
  font-weight:300;
  line-height:1.8;
  color:rgba(232,223,200,0.75);
}
.modal-kw {
  display:inline-block;
  padding:0.2rem 0.55rem;
  border:1px solid rgba(201,149,42,0.2);
  border-radius:10px;
  font-size:0.6rem;
  color:rgba(201,149,42,0.7);
  font-family:'Noto Sans SC',sans-serif;
  margin:0.2rem;
}
.modal-trigrams-row { display:flex; gap:0.8rem; margin-top:0.5rem; }
.modal-trigram {
  flex:1; text-align:center;
  padding:0.7rem 0.5rem;
  border:1px solid rgba(201,149,42,0.12);
  border-radius:2px;
  background: rgba(201,149,42,0.02);
}
.mt-lines { display:flex; flex-direction:column-reverse; gap:4px; align-items:center; margin-bottom:0.4rem; }
.mt-bar { height:4px; border-radius:1px; background:var(--parchment); }
.mt-bar.yang { width:34px; }
.mt-bar.yin-l,.mt-bar.yin-r { width:14px; }
.mt-en { font-family:'IM Fell English',serif; font-style:italic; font-size:0.85rem; color:var(--gold); }
.mt-el { font-size:0.58rem; color:rgba(232,223,200,0.4); font-family:'Noto Sans SC',sans-serif; margin-top:0.2rem; }
.mt-role { font-size:0.5rem; letter-spacing:0.2em; font-family:'Noto Sans SC',sans-serif; margin-top:0.3rem; }
.ti-role { color:rgba(201,149,42,0.6); }
.yong-role { color:rgba(192,57,43,0.6); }

.modal-moving-note {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.7rem;
  font-weight:300;
  line-height:1.8;
  color:rgba(232,223,200,0.55);
  padding:0.7rem;
  border:1px solid rgba(192,57,43,0.15);
  border-radius:2px;
  background:rgba(192,57,43,0.03);
  margin-top:0.5rem;
}
.modal-moving-note em { color:rgba(192,57,43,0.8); font-style:normal; }

.calc-note {
  font-family:'Noto Sans SC',sans-serif;
  font-size:0.68rem;
  font-weight:300;
  color:rgba(232,223,200,0.35);
  line-height:1.8;
  padding:0.7rem;
  border:1px solid rgba(201,149,42,0.08);
  border-radius:2px;
  margin-top:0.5rem;
}

footer {
  position:relative; z-index:1;
  text-align:center; padding:1.5rem 2rem;
  font-family:'IM Fell English',serif;
  font-size:0.6rem;
  font-weight:300;
  letter-spacing:0.08em;
  color:rgba(201,149,42,0.35);
  line-height:1.8;
}
footer em { font-style:italic; color:rgba(201,149,42,0.55); }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.hex-card { animation:fadeUp 0.7s ease both; }
.secondary-row { animation:fadeUp 0.7s ease both 0.15s; }
.calc-band { animation:fadeUp 0.6s ease both 0.25s; }

@media(max-width:480px){
  .hex-card-inner { flex-direction:column; align-items:center; gap:1.5rem; }
  .hex-info { text-align:center; }
  .trigram-label { display:none; }
}
</style>

<script>
const TRIGRAMS = [
  null,
  { num:1, zh:'Qian', en:'Heaven',   lines:[1,1,1], el:'Metal', dir:'Northwest', nature:'Creative, strong, father' },
  { num:2, zh:'Dui',  en:'Lake',     lines:[1,1,0], el:'Metal', dir:'West',      nature:'Joyful, open, youngest daughter' },
  { num:3, zh:'Li',   en:'Fire',     lines:[1,0,1], el:'Fire',  dir:'South',     nature:'Clinging, bright, middle daughter' },
  { num:4, zh:'Zhen', en:'Thunder',  lines:[1,0,0], el:'Wood',  dir:'East',      nature:'Arousing, movement, eldest son' },
  { num:5, zh:'Xun',  en:'Wind',     lines:[0,1,1], el:'Wood',  dir:'Southeast', nature:'Gentle, penetrating, eldest daughter' },
  { num:6, zh:'Kan',  en:'Water',    lines:[0,1,0], el:'Water', dir:'North',     nature:'Dangerous, abysmal, middle son' },
  { num:7, zh:'Gen',  en:'Mountain', lines:[0,0,1], el:'Earth', dir:'Northeast', nature:'Stillness, keeping still, youngest son' },
  { num:8, zh:'Kun',  en:'Earth',    lines:[0,0,0], el:'Earth', dir:'Southwest', nature:'Receptive, yielding, mother' },
];

const STEM_VALUES = {
  'Jia':1,'Yi':2,'Bing':3,'Ding':4,'Wu':5,'Ji':6,'Geng':7,'Xin':8,'Ren':9,'Gui':10
};

const HOUR_TO_BRANCH_VAL = (h) => {
  const idx = Math.floor((h + 1) / 2) % 12;
  return idx + 1;
};
const BRANCH_LABELS = ['Zi','Chou','Yin','Mao','Chen','Si','Wu','Wei','Shen','You','Xu','Hai'];

const yearStem = (y) => {
  const stems = ['Jia','Yi','Bing','Ding','Wu','Ji','Geng','Xin','Ren','Gui'];
  return stems[((y - 1984) % 10 + 10) % 10];
};

function getLunar(date) {
  const MONTH = 29.53;
  const epochs = [
    { d: new Date(2026,1,17), y:'Bing-Wu' },
    { d: new Date(2025,0,29), y:'Yi-Si' },
    { d: new Date(2024,1,10), y:'Jia-Chen' },
    { d: new Date(2023,0,22), y:'Gui-Mao' },
  ];
  let ep = epochs[epochs.length-1];
  for (const e of epochs) { if (date >= e.d) { ep = e; break; } }
  const days = Math.floor((date - ep.d) / 86400000);
  const mo = Math.min(Math.floor(days / MONTH) + 1, 12);
  const dy = Math.min((days % Math.round(MONTH)) + 1, 30);
  return { lunarYear: ep.y, lunarMonth: mo, lunarDay: dy };
}

const HEX64 = [
  {num:1,  en:'The Creative',             u:1,l:1, kw:['Strength','Heaven','Initiative'],        desc:'Pure heaven above and below — yang in every line. The supreme creative force. All things find their origin here. Righteous perseverance brings great success. Act with the confidence of heaven itself.'},
  {num:2,  en:'The Receptive',            u:8,l:8, kw:['Earth','Yielding','Devotion'],           desc:'Pure earth above and below — yin in every line. Boundless receptive power nurtures all life without assertion. Follow rather than lead; the devoted serve where the bold conquer. Success through steadfastness.'},
  {num:3,  en:'Difficulty at Beginning', u:6,l:4, kw:['Birth','Struggle','Seek Help'],          desc:'Water above thunder — new shoots forcing through frozen ground. The moment of birth is difficult but full of potential. Seek helpers and allies; do not attempt everything alone. Persevere through the initial chaos.'},
  {num:4,  en:'Youthful Folly',          u:7,l:6, kw:['Learning','Instruction','Youth'],        desc:'Mountain above water — a spring emerging at the mountain\'s foot. The young must seek the teacher, not the reverse. Genuine inquiry opens the way to wisdom. Patient instruction and sincere learning bring success.'},
  {num:5,  en:'Waiting',                 u:6,l:1, kw:['Patience','Nourishment','Trust'],        desc:'Water above heaven — clouds gathering before rain. Confident waiting brings nourishment. Do not force what is not yet ripe. Inner strength and sincere trust in the right moment will prevail.'},
  {num:6,  en:'Conflict',                u:1,l:6, kw:['Dispute','Caution','Mediation'],         desc:'Heaven above water — opposing forces in tension. Conflict arises from divergent aims. Seek mediation before strife deepens; prolonged conflict exhausts all parties. Partial success is possible; do not push to extremes.'},
  {num:7,  en:'The Army',                u:8,l:6, kw:['Discipline','Leadership','Order'],       desc:'Earth above water — a vast reservoir of force. Disciplined organisation brings order from chaos. The general who leads by virtue and example prevails. Mass effort under righteous authority succeeds.'},
  {num:8,  en:'Holding Together',        u:6,l:8, kw:['Union','Alliance','Loyalty'],            desc:'Water above earth — streams flowing together to the sea. Seek union and find your proper place within the whole. Those who hesitate and come late may miss the moment. Commit wholeheartedly to the right alliance.'},
  {num:9,  en:'Small Taming',            u:5,l:1, kw:['Restraint','Accumulate','Patience'],    desc:'Wind above heaven — gentle restraint holds great force in check. The time for major action has not arrived. Accumulate strength quietly through small, patient steps. Dense clouds gather but rain has not yet fallen.'},
  {num:10, en:'Treading',                u:1,l:2, kw:['Conduct','Propriety','Caution'],         desc:'Heaven above lake — treading near the tiger\'s tail. Correct and careful conduct in dangerous situations. Proceed with full awareness of your position and the risks. Propriety and good manners see one through.'},
  {num:11, en:'Peace',                   u:8,l:1, kw:['Harmony','Prosperity','Exchange'],       desc:'Earth above heaven — heaven and earth in perfect embrace. Great harmony and prosperity flow freely. The great descends to the small; the small ascends to meet it. The superior and inferior exchange in mutual benefit.'},
  {num:12, en:'Standstill',              u:1,l:8, kw:['Stagnation','Obstruction','Withdraw'],   desc:'Heaven above earth — they draw apart, communication ceases. Inferior forces obstruct the way of the worthy. The wise person withdraws and preserves virtue. Wait without action until the natural turning point arrives.'},
  {num:13, en:'Fellowship',              u:1,l:3, kw:['Community','Openness','Shared Purpose'], desc:'Heaven above fire — the sun illuminates all equally. Open, inclusive fellowship with humanity. Narrow cliques lead to conflict; broad, sincere community succeeds. Cross the great water together with a shared aim.'},

function hexByUL(u,l){ return HEX64.find(h=>h.u===u&&h.l===l)||HEX64[0]; }
function hexByNum(n){ return HEX64.find(h=>h.num===n)||HEX64[0]; }

function calculate(date){
  const {lunarMonth,lunarDay}=getLunar(date);
  const stem=yearStem(date.getFullYear());
  const stemVal=STEM_VALUES[stem];
  const hourBranchVal=HOUR_TO_BRANCH_VAL(date.getHours());
  const hourBranchLabel=BRANCH_LABELS[Math.floor((date.getHours()+1)/2)%12];
  const upperSum=stemVal+lunarMonth+lunarDay;
  const fullSum=upperSum+hourBranchVal;
  let upperNum=upperSum%8; if(upperNum===0)upperNum=8;
  let lowerNum=fullSum%8;  if(lowerNum===0)lowerNum=8;
  let movingLine=fullSum%6; if(movingLine===0)movingLine=6;
  const primary=hexByUL(upperNum,lowerNum);
  const upperTri=TRIGRAMS[primary.u];
  const lowerTri=TRIGRAMS[primary.l];
  const allLines=[...lowerTri.lines,...upperTri.lines];
  const changedLines=allLines.map((v,i)=>i===(movingLine-1)?(v===1?0:1):v);
  const changed=hexByUL(trigramFromLines(changedLines.slice(3)),trigramFromLines(changedLines.slice(0,3)));
  const mutual=hexByUL(trigramFromLines(allLines.slice(2,5)),trigramFromLines(allLines.slice(1,4)));
  const movingInUpper=movingLine>=4;
  return {
    stem,stemVal,lunarMonth,lunarDay,hourBranchVal,hourBranchLabel,
    upperSum,fullSum,upperNum,lowerNum,movingLine,
    primary,changed,mutual,allLines,
    tiTrigram:movingInUpper?upperTri:lowerTri,
    yongTrigram:movingInUpper?lowerTri:upperTri,
    movingInUpper,
  };
}

function trigramFromLines(l){
  const t=TRIGRAMS.slice(1).find(t=>t.lines.join('')===l.join(''));
  return t?t.num:1;
}

function drawMainLines(allLines,movingLine){
  return allLines.map((v,i)=>{
    const n=i+1;
    const mc=n===movingLine?' moving':'';
    let h=`<div class="hex-row"><span class="hex-row-num">${n}</span>`;
    if(v===1) h+=`<div class="hbar yang${mc}"></div>`;
    else h+=`<div class="hbar yin-l${mc}"></div><div style="width:10px"></div><div class="hbar yin-r${mc}"></div>`;
    return h+`</div>`;
  }).join('');
}

function drawSmallLines(allLines){
  return allLines.map(v=>{
    if(v===1) return `<div class="crow"><div class="cbar yang"></div></div>`;
    return `<div class="crow"><div class="cbar yin-l"></div><div style="width:6px"></div><div class="cbar yin-r"></div></div>`;
  }).join('');
}

function drawModalLines(allLines,movingLine){
  return allLines.map((v,i)=>{
    const n=i+1,mc=n===movingLine?' moving-m':'';
    let h=`<div class="modal-hex-row">`;
    if(v===1) h+=`<div class="mbar yang${mc}"></div>`;
    else h+=`<div class="mbar yin-l${mc}"></div><div style="width:12px"></div><div class="mbar yin-r${mc}"></div>`;
    return h+`<span class="modal-hex-row-num">${n}</span></div>`;
  }).join('');
}

function drawTrigramLines(tri){
  return tri.lines.map(v=>{
    if(v===1) return `<div style="display:flex;gap:4px"><div class="mt-bar yang"></div></div>`;
    return `<div style="display:flex;gap:4px"><div class="mt-bar yin-l"></div><div style="width:5px"></div><div class="mt-bar yin-r"></div></div>`;
  }).join('');
}

function openModal(hexNum,movingLine,context){

  const allL=[...TRIGRAMS[h.l].lines,...TRIGRAMS[h.u].lines];
  const movingInUpper=movingLine&&movingLine>=4;
  const tiT=movingLine?(movingInUpper?lT:uT):null;
  const yongT=movingLine?(movingInUpper?uT:lT):null;
  const lineText=['1st','2nd','3rd','4th','5th','6th'];
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-top">
      <div><div class="modal-hex-lines">${drawModalLines(allL,movingLine||0)}</div></div>
      <div class="modal-identity">
        <div class="modal-num">HEXAGRAM ${h.num} OF 64</div>
        <div class="modal-name-en">${h.en}</div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-section-title">Judgment</div>
    <div class="modal-body-text">${h.desc}</div>
    <div style="margin-top:0.7rem">${h.kw.map(k=>`<span class="modal-kw">${k}</span>`).join('')}</div>
    <div class="modal-divider"></div>
    <div class="modal-section-title">Trigrams</div>
    <div class="modal-trigrams-row">
      <div class="modal-trigram">
        <div class="mt-lines">${drawTrigramLines(uT)}</div>
        <div class="mt-en">${uT.en}</div>
        <div class="mt-el">${uT.el} · ${uT.dir}</div>
        <div class="mt-el" style="margin-top:0.2rem">${uT.nature}</div>
        ${tiT&&yongT?`<div class="mt-role ${uT===tiT?'ti-role':'yong-role'}">${uT===tiT?'Ti — Subject':'Yong — Function'}</div>`:''}
        <div class="mt-role" style="color:rgba(201,149,42,0.35);font-size:0.45rem;letter-spacing:0.2em">UPPER</div>
      </div>
      <div class="modal-trigram">
        <div class="mt-lines">${drawTrigramLines(lT)}</div>
        <div class="mt-en">${lT.en}</div>
        <div class="mt-el">${lT.el} · ${lT.dir}</div>
        <div class="mt-el" style="margin-top:0.2rem">${lT.nature}</div>
        ${tiT&&yongT?`<div class="mt-role ${lT===tiT?'ti-role':'yong-role'}">${lT===tiT?'Ti — Subject':'Yong — Function'}</div>`:''}
        <div class="mt-role" style="color:rgba(201,149,42,0.35);font-size:0.45rem;letter-spacing:0.2em">LOWER</div>
      </div>
    </div>
    ${movingLine?`
    <div class="modal-divider"></div>
    <div class="modal-section-title">Moving Line</div>
    <div class="modal-moving-note">
      Line <em>${movingLine}</em> (the ${lineText[movingLine-1]}) is the moving line — the point of active transformation.
      It marks <em>${yongT?.en}</em> as the <em>Yong</em> trigram — the function, outcome, or thing being asked about.
      <em>${tiT?.en}</em> is the <em>Ti</em> trigram — the subject, the inner condition.
      When this line changes, the hexagram transforms into the Changed Hexagram.
    </div>`:''}
    ${context?`
    <div class="modal-divider"></div>
    <div class="modal-section-title">Calculation</div>
    <div class="calc-note">${context}</div>`:''}
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
function closeOverlay(e){ if(e.target===document.getElementById('modal'))closeModal(); }

let lastMinute=-1;

function fmt12(h,m){
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function render(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  const timeEl=document.getElementById('clockTime');
  if(timeEl) timeEl.textContent=fmt12(h,m);
  if(m===lastMinute) return;
  lastMinute=m;

  const C=calculate(now);
  const {stem,stemVal,lunarMonth,lunarDay,hourBranchVal,hourBranchLabel,
         upperSum,fullSum,upperNum,lowerNum,movingLine,
         primary,changed,mutual,allLines,tiTrigram,yongTrigram,movingInUpper}=C;
  const uT=TRIGRAMS[primary.u],lT=TRIGRAMS[primary.l];
  const changedAllLines=allLines.map((v,i)=>i===(movingLine-1)?(v===1?0:1):v);

  const ctxText=`Lunar year stem: <strong>${stem}</strong> = ${stemVal} &nbsp;·&nbsp; Lunar month: ${lunarMonth} &nbsp;·&nbsp; Lunar day: ${lunarDay}<br>
    Upper: (${stemVal}+${lunarMonth}+${lunarDay}) mod 8 = <strong>${upperNum}</strong> → ${TRIGRAMS[upperNum].en}<br>
    Hour branch: ${hourBranchLabel} = ${hourBranchVal}<br>
    Lower: (${upperSum}+${hourBranchVal}) mod 8 = <strong>${lowerNum}</strong> → ${TRIGRAMS[lowerNum].en}<br>
    Moving line: ${fullSum} mod 6 = <strong>${movingLine}</strong>`;

  document.getElementById('hexStage').innerHTML=`
    <div class="hex-stage">
      <div class="hex-card" onclick="openModal(${primary.num},${movingLine},\`${ctxText.replace(/`/g,"'")}\`)">
        <div class="hex-card-inner">
          <div class="hex-lines-wrap">${drawMainLines(allLines,movingLine)}</div>
          <div class="hex-info">
            <div class="hex-num-badge">PRIMARY · No.${primary.num}</div>
            <div class="hex-name-en">${primary.en}</div>
            <div class="hex-trigrams-note">
              ${uT.en} above &nbsp;·&nbsp; ${lT.en} below<br>
              Moving line ${movingLine} &nbsp;·&nbsp; ${movingInUpper?uT.en:lT.en} is Yong
            </div>
          </div>
        </div>
        <div class="ti-yong-row">
          <span class="ti-badge">Ti · ${tiTrigram.en} · Subject</span>
          <span class="yong-badge">Yong · ${yongTrigram.en} · Function</span>
        </div>
        <div class="hex-tap-hint">tap to learn</div>
      </div>
      <div class="secondary-row">
        <div class="secondary-card" onclick="openModal(${changed.num},null,'Changed hexagram: line ${movingLine} flips, producing No.${changed.num} ${changed.en}.')">
          <div class="secondary-label">Changed</div>
          <div class="secondary-lines">${drawSmallLines(changedAllLines)}</div>
          <div class="secondary-name-en">${changed.en}</div>
          <div class="secondary-num">No.${changed.num}</div>
          <div class="secondary-tap">tap to learn</div>
        </div>
        <div class="secondary-card" onclick="openModal(${mutual.num},null,'Mutual hexagram: formed from lines 2-3-4 and 3-4-5 of the primary. Reveals the hidden inner dynamic.')">
          <div class="secondary-label">Mutual</div>
          <div class="secondary-lines">${drawSmallLines([...TRIGRAMS[mutual.l].lines,...TRIGRAMS[mutual.u].lines])}</div>
          <div class="secondary-name-en">${mutual.en}</div>
          <div class="secondary-num">No.${mutual.num}</div>
          <div class="secondary-tap">tap to learn</div>
        </div>
      </div>
    </div>
  `;

  const dateStr=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('calcBand').innerHTML=`
    <div class="calc-band">
      <div class="calc-datetime">${dateStr} &nbsp;·&nbsp; <span id="clockTime">${fmt12(h,m)}</span></div>
      <div class="calc-divider"></div>
      <div class="calc-row">
        <span class="calc-item">Year Stem: <strong>${stem}</strong> = ${stemVal}</span>
        <span class="calc-item">Lunar Month: <strong>${lunarMonth}</strong></span>
        <span class="calc-item">Lunar Day: <strong>${lunarDay}</strong></span>
        <span class="calc-item">Hour Branch: <strong>${hourBranchLabel}</strong> = ${hourBranchVal}</span>
      </div>
      <div class="calc-row" style="margin-top:0.2rem">
        <span class="calc-item">Upper: (${stemVal}+${lunarMonth}+${lunarDay}) mod 8 = <strong>${upperNum}</strong> → ${uT.en}</span>
        <span class="calc-item">Lower: +${hourBranchVal} mod 8 = <strong>${lowerNum}</strong> → ${lT.en}</span>
        <span class="calc-item">Moving Line: mod 6 = <strong>${movingLine}</strong></span>
      </div>
    </div>
  `;
}

render();
setInterval(render,1000);
</script>
</body>
</html>
